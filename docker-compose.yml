services:
  postgres:
    image: postgres:17-alpine
    container_name: taskmaster-postgres
    environment:
      POSTGRES_USER: taskmaster
      POSTGRES_PASSWORD: taskmaster
      POSTGRES_DB: taskmaster
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U taskmaster -d taskmaster"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    environment:
      NODE_ENV: production
      PORT: 4000
      DATABASE_URL: postgresql://taskmaster:taskmaster@postgres:5432/taskmaster
      CORS_ORIGIN: http://localhost:8080
      # Local/demo secret — override with a real one in production.
      JWT_SECRET: local-dev-secret-change-in-production
      JWT_EXPIRES_IN: 7d
      # This stack is tested over plain HTTP; behind HTTPS drop this (-> Secure).
      COOKIE_SECURE: "false"
    depends_on:
      postgres:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        # Empty -> the browser calls the API with relative /api URLs, i.e. the
        # same origin it was served from (through the proxy). No CORS needed.
        NEXT_PUBLIC_API_URL: ""
    depends_on:
      - api

  # Reverse proxy = the single entry point (production-shaped topology).
  caddy:
    image: caddy:2-alpine
    ports:
      - "8080:80"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
    depends_on:
      - web
      - api

volumes:
  pgdata:
